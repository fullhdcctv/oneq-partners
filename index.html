<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Redirect</title>
</head>
<body>

<script>
const params = new URLSearchParams(window.location.search);
const agent = params.get('agent');

window.location.replace(
    'http://skadt.mycafe24.com/qr/?code=' +
    encodeURIComponent(agent)
);
</script>

</body>
</html>
